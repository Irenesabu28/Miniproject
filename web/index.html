<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="elcb_monitor">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>elcb_monitor</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <style>
    body {
      background-color: #0F172A;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Outfit', sans-serif;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .shimmer-logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #6366F1 0%, #818CF8 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
      margin-bottom: 24px;
      position: relative;
      animation: pulse 2s infinite ease-in-out;
    }

    .shimmer-logo i {
      color: white;
      font-size: 50px;
    }

    .loading-text {
      color: #94A3B8;
      font-size: 18px;
      letter-spacing: 2px;
      font-weight: 500;
      text-transform: uppercase;
      animation: fadeIn 1.5s ease-out;
    }

    .progress-bar {
      width: 200px;
      height: 4px;
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      margin-top: 16px;
      overflow: hidden;
    }

    .progress-fill {
      width: 30%;
      height: 100%;
      background: linear-gradient(90deg, #6366F1, #818CF8);
      border-radius: 2px;
      animation: progress 2.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
      70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
    }

    @keyframes progress {
      0% { width: 0%; transform: translateX(-100%); }
      50% { width: 70%; transform: translateX(50%); }
      100% { width: 0%; transform: translateX(200%); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <div id="loading-indicator" class="loader-container">
    <div class="shimmer-logo">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 10V3L4 14H11V21L20 10H13Z" fill="white" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="loading-text">ELCB Monitor Initializing</div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Remove loading indicator when Flutter starts
    window.addEventListener('load', function(ev) {
      // The loading indicator remains until the engine is initialized.
      // You can also use the Flutter lifecycle hooks in flutter_bootstrap.js 
      // if you need more granular control.
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/firebase-messaging-sw.js')
        .then((registration) => {
          console.log('Firebase Messaging Service Worker registered:', registration);
        }).catch((error) => {
          console.error('Firebase Messaging Service Worker error:', error);
        });
    }
  </script>
</body>
</html>
